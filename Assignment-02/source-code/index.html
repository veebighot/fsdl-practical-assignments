<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSE Project Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">?? My Project Task Tracker</h2>
        <div class="card shadow-sm p-4 mb-5">
            <form id="projectForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="taskName" class="form-control" placeholder="Task Name (e.g. Brainstorming)" required>
                    </div>
                    <div class="col-md-4">
                        <select id="priority" class="form-select">
                            <option value="success">Low Priority ??</option>
                            <option value="warning">Medium Priority ??</option>
                            <option value="danger">High Priority ??</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>
        <div id="taskDisplay" class="row row-cols-1 row-cols-md-3 g-3"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
